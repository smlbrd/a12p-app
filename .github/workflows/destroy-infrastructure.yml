name: Destroy Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  AWS_ROLE_ARN: arn:aws:iam::261219435789:role/a12p-wh-gha-deploy-role
  ECR_REPOSITORY: a12p-wh-api-repo
  TF_VAR_database_url: ${{ secrets.DATABASE_URL }}

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Bundle API
        run: |
          npx esbuild src/lambda.ts --bundle --platform=node --target=node24 --outfile=dist/index.js  

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Destroy
        run: terraform destroy -var="image_tag=${{ github.sha }}" -auto-approve
        working-directory: ./terraform