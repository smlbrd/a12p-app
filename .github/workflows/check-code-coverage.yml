name: Check Code Coverage

on:
  pull_request:
    branches: [ main ]

env:
  TEST_DB_CONTAINER: postgresql://test_user:test_password@localhost:5433/test_db

jobs:
  check-code-coverage:
    name: Check Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Start Local Docker Database
        run: docker compose up -d

      - name: Wait for PostgreSQL to be ready
        run: |
          until docker compose exec -T test_db pg_isready -U test_user -d test_db; do
          echo "Waiting for database to accept connections..."
          sleep 1
          done

      - name: Sync Database Schema
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ env.TEST_DB_CONTAINER }}

      - name: Check code coverage
        run: npx vitest run --coverage
        env:
          DATABASE_URL: ${{ env.TEST_DB_CONTAINER }}